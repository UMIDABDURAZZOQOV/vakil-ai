# Render blueprint for the Vakil AI backend + Postgres.
# In Render: New → Blueprint → pick this repo. It reads this file and creates
# the database + web service. Then fill in the `sync: false` secrets in the
# service's Environment tab (GEMINI_API_KEY, ALLOWED_ORIGINS, payment keys, etc.).

databases:
  - name: vakil-ai-db
    plan: free

services:
  - type: web
    name: vakil-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vakil-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Your Vercel web origin(s), comma-separated, e.g. https://vakil-ai.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PAYME_MERCHANT_ID
        sync: false
      - key: PAYME_SECRET_KEY
        sync: false
      - key: PAYME_TEST_MODE
        value: "true"
      - key: CLICK_SERVICE_ID
        sync: false
      - key: CLICK_MERCHANT_ID
        sync: false
      - key: CLICK_SECRET_KEY
        sync: false
